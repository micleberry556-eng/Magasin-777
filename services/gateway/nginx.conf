events {
    worker_connections 1024;
}

http {
    # Таймауты и буферы
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Upstream-сервисы
    upstream evaluator {
        server evaluator-service:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # --- Evaluator Service ---
        location /api/v1/evaluate {
            proxy_pass http://evaluator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Evaluator Health Check ---
        location /api/v1/health {
            proxy_pass http://evaluator/health;
            proxy_set_header Host $host;
        }

        # --- Catalog Service (заглушка на будущий сервис) ---
        location /api/catalog {
            default_type application/json;
            return 200 '{"status": "Catalog service placeholder"}';
        }

        # --- Auth Service (заглушка на будущий сервис) ---
        location /api/auth {
            default_type application/json;
            return 200 '{"status": "Auth service placeholder"}';
        }

        # --- Frontend (все остальные запросы) ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (для Next.js HMR в dev-режиме)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
